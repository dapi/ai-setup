name: video-chat-and-translator

services:
  web:
    build:
      context: ../video_chat_and_translator
      dockerfile: ../docker/Dockerfile
    ports:
      - "${PORT:-3100}:3100"
      - "3036:3036"
    volumes:
      - ../video_chat_and_translator:/app
      - bundle_cache:/usr/local/bundle
      - node_modules:/app/node_modules
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/video_chat_and_translator_development
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=development
      - VITE_RUBY_HOST=0.0.0.0
      - PORT=3100
      - BINDING=0.0.0.0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - video_chat_network
    stdin_open: true
    tty: true

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_chat_and_translator_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - video_chat_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - video_chat_network

  sidekiq:
    build:
      context: ../video_chat_and_translator
      dockerfile: ../docker/Dockerfile
    command: bundle exec sidekiq
    volumes:
      - ../video_chat_and_translator:/app
      - bundle_cache:/usr/local/bundle
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/video_chat_and_translator_development
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - video_chat_network

volumes:
  postgres_data:
  bundle_cache:
  node_modules:
  redis_data:

networks:
  video_chat_network:
    driver: bridge
