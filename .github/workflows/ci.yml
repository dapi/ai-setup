name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: ./node_modules

      - name: Lint
        run: bun run lint:ci

  compile:
    name: Compile
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: ./node_modules

      - name: Compile
        run: bun run compile

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: ./node_modules

      - name: Build
        run: bun run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 30
    env:
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: ./node_modules

      - name: Build
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Unit tests with coverage
        run: bun test --coverage src/

      - name: E2E tests
        run: bunx playwright test
