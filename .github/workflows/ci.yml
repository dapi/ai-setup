name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Validate GitHub Actions
        run: |
          set -euo pipefail
          version="$(curl -fsSL https://api.github.com/repos/rhysd/actionlint/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          curl -fsSL -o /tmp/actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/${version}/actionlint_${version#v}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint -color

      - name: Install shell linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Check shell formatting
        run: shfmt -d init.sh scripts/*.sh

      - name: Lint shell scripts
        run: shellcheck init.sh scripts/*.sh

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2 "**/*.md"

  smoke-bootstrap:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      GITHUB_TOKEN: ${{ github.token }}
      AQUA_GITHUB_TOKEN: ${{ github.token }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Bootstrap toolchain
        run: make bootstrap

      - name: Install agent CLIs and helper tools
        run: make agents agents-cli

      - name: Run CI smoke checks
        run: ./scripts/test-ci.sh

  app:
    name: App checks (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Prepare artifact directory
        run: mkdir -p /tmp/ci-artifacts

      - name: Build Docker image
        run: docker compose -f docker/docker-compose.ci.yml build web 2>&1 | tee /tmp/ci-artifacts/docker-build-log.txt

      - name: Setup database
        run: docker compose -f docker/docker-compose.ci.yml run --rm web bin/setup --skip-server

      - name: Run CI checks
        run: docker compose -f docker/docker-compose.ci.yml run --rm web bin/ci

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker/docker-compose.ci.yml logs > /tmp/ci-artifacts/docker-compose-runtime-logs.txt 2>&1 || true
          docker compose -f docker/docker-compose.ci.yml cp web:/app/log/test.log /tmp/ci-artifacts/test.log || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.x
        with:
          name: ci-failure-logs
          path: /tmp/ci-artifacts/

      - name: Teardown
        if: always()
        run: docker compose -f docker/docker-compose.ci.yml down -v
